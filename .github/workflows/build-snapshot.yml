name: Build static snapshot (spots data + recipe pages + sitemap)

on:
  schedule:
    # 매 30분마다. 필요하면 간격 조정.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # 수동 실행 버튼
  push:
    branches: [main]
    paths-ignore:
      - 'data/api/**'
      - 'recipe/**'
      - 'sitemap.xml'

permissions:
  contents: write

concurrency:
  group: build-snapshot
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate static snapshot
        run: node build/generate-static.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "beggar-network-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/api recipe sitemap.xml
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: refresh static data snapshot [skip ci]"
            git push
          fi
